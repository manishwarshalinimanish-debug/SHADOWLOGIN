<!DOCTYPE html>
<html>
<head>
    <title>ShadowLogin</title>

    <style>

        body{
            background:black;
            color:white;
            text-align:center;
            font-family:Arial;
            margin-top:100px;
        }

        input{
            padding:10px;
            width:250px;
            margin:10px;
        }

        button{
            padding:10px 30px;
            background:red;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

    <h1>Employee Portal</h1>

    <form action="/login" method="POST">

        <input type="text" name="username" placeholder="Username">

        <br>

        <input type="password" name="password" placeholder="Password">

        <br>

        <button type="submit">Login</button>

    </form>

</body>
</html>
